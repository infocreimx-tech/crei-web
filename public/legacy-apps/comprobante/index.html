<!doctype html>
<html lang="es">
<head>
    <script src="/legacy-apps/injectSSO.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Auditoría de Gastos en la Nube</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config={theme:{extend:{colors:{brand:{50:'#ecfeff',100:'#cffafe',600:'#0e7490',700:'#155e75',800:'#0b3a46'},supabase:{500:'#3ecf8e',600:'#24b47e'}},fontFamily:{sans:['Plus Jakarta Sans','Inter','system-ui','-apple-system','Segoe UI','Roboto','Helvetica','Arial','sans-serif']}}}}
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      body{font-family:Plus Jakarta Sans,Inter,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
      .dropzone{border:2px dashed #e2e8f0; transition:all 0.2s;}
      .dropzone.drag{border-color:#3ecf8e;background:#ecfdf5; transform:scale(1.02);}
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="relative min-h-screen bg-slate-50">
  <div class="relative overflow-hidden pointer-events-none">
    <div class="absolute inset-x-0 top-0 h-1 bg-gradient-to-r from-supabase-500 via-brand-600 to-brand-800"></div>
    <div class="absolute -top-24 -left-24 h-80 w-80 rounded-full bg-gradient-to-br from-brand-800 via-supabase-500 to-cyan-400 opacity-20 blur-3xl"></div>
  </div>
  
  <div class="max-w-5xl mx-auto px-4 py-12 relative z-10">
    <div class="mb-8 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
      <div>
        <div class="inline-flex items-center gap-2 rounded-full bg-supabase-500/10 text-supabase-600 px-3 py-1 text-xs font-bold border border-supabase-500/20">
          <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor"><path d="M12.0003 21.085L18.7303 6.94299H5.27031L12.0003 21.085ZM12.0003 24C11.5353 24 11.0883 23.829 10.7423 23.513L1.57131 15.15C0.970313 14.603 0.751313 13.738 1.00031 12.96L4.31931 3.26699C4.60631 2.42899 5.39031 1.86899 6.27031 1.86899H17.7303C18.6103 1.86899 19.3943 2.42899 19.6813 3.26699L23.0003 12.96C23.2493 13.738 23.0303 14.603 22.4293 15.15L13.2583 23.513C12.9123 23.829 12.4653 24 12.0003 24Z"/></svg>
          Desarrollado en Supabase Edge
        </div>
        <h1 class="mt-3 text-3xl md:text-4xl font-black tracking-tight text-slate-900">Archivero Financiero</h1>
        <p class="text-slate-500 mt-2 font-medium">Registra tus gastos, edita el historial operativo y consulta la bóveda en tiempo real.</p>
      </div>
      <div>
         <button onclick="loadGastos()" class="shadow-sm border border-slate-200 bg-white hover:bg-slate-50 text-slate-700 text-sm font-bold flex items-center gap-2 px-4 py-2 rounded-xl transition cursor-pointer">
           <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
           Sincronizar Bóveda
         </button>
      </div>
    </div>
    
    <div id="alertBox" class="mb-6 rounded-xl border border-emerald-200 bg-emerald-50 p-4 text-emerald-800 font-bold hidden flex items-center justify-between">
      <span id="alertMessage">Operación exitosa en Supabase.</span>
      <button onclick="document.getElementById('alertBox').style.display='none'"><svg class="w-5 h-5 opacity-60 hover:opacity-100" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
    </div>
    
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
      <!-- FORMULARIO DE CARGA -->
      <div class="lg:col-span-4 bg-white rounded-3xl border border-slate-200 shadow-xl shadow-slate-200/40 p-6 sticky top-6">
        <form id="uploadForm" class="space-y-6">
          <h2 class="text-lg font-black text-slate-800 border-b border-slate-100 pb-3 flex items-center gap-2">
            <svg class="w-5 h-5 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            Nuevo Comprobante
          </h2>
          
          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Usuario Central (SSO)</label>
            <input id="usuario_sso" name="usuario" type="text" readonly placeholder="Autenticando..." class="w-full bg-slate-100 text-slate-600 rounded-xl border-slate-200 py-3 px-4 font-black cursor-not-allowed">
          </div>

          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Correo <span class="text-rose-500">*</span></label>
            <input id="correo" type="email" required placeholder="tu@correo.mx" class="w-full rounded-xl border border-slate-300 focus:border-brand-500 focus:ring-1 focus:ring-brand-500 py-2.5 px-4 text-sm font-medium outline-none transition">
          </div>

          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Concepto <span class="text-rose-500">*</span></label>
            <input id="concepto" type="text" required maxlength="160" placeholder="Ej. Material Médico" class="w-full rounded-xl border border-slate-300 focus:border-brand-500 focus:ring-1 focus:ring-brand-500 py-2.5 px-4 text-sm font-medium outline-none transition">
          </div>

          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Importe (MXN) <span class="text-rose-500">*</span></label>
            <div class="relative">
              <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400 font-bold">$</span>
              <input id="importe" type="number" step="0.01" min="0" placeholder="0.00" required class="w-full pl-8 rounded-xl border border-slate-300 focus:border-brand-500 focus:ring-1 focus:ring-brand-500 py-2.5 px-4 text-sm font-bold outline-none transition text-slate-800">
            </div>
          </div>

          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Categoría <span class="text-rose-500">*</span></label>
            <div class="grid grid-cols-3 gap-2">
              <label class="flex items-center justify-center gap-1 rounded-xl border border-slate-200 p-2.5 hover:border-slate-300 cursor-pointer transition text-xs font-bold bg-slate-50">
                <input type="radio" name="tipo" value="Factura" class="text-brand-600 accent-brand-600 w-3 h-3" required> <span class="text-slate-700">Factura</span>
              </label>
              <label class="flex items-center justify-center gap-1 rounded-xl border border-slate-200 p-2.5 hover:border-slate-300 cursor-pointer transition text-xs font-bold bg-slate-50">
                <input type="radio" name="tipo" value="Ticket" class="text-brand-600 accent-brand-600 w-3 h-3" required> <span class="text-slate-700">Ticket</span>
              </label>
              <label class="flex items-center justify-center gap-1 rounded-xl border border-slate-200 p-2.5 hover:border-slate-300 cursor-pointer transition text-xs font-bold bg-slate-50">
                <input type="radio" name="tipo" value="Vale" class="text-brand-600 accent-brand-600 w-3 h-3" required> <span class="text-slate-700">Vale</span>
              </label>
            </div>
          </div>

          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Subir Archivo <span class="text-rose-500">*</span></label>
            <div id="dropzone" class="dropzone rounded-xl p-6 flex flex-col items-center justify-center text-center bg-slate-50 cursor-pointer hover:bg-slate-100/80 transition">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-400 mb-1 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" /></svg>
              <p class="text-slate-600 text-xs font-semibold pointer-events-none">PDF o JPG/PNG</p>
              <p id="fileName" class="text-supabase-600 font-bold text-xs mt-2 hidden bg-supabase-50 px-2 py-1 rounded truncate w-full pointer-events-none"></p>
            </div>
            <input id="fileInput" type="file" accept=".pdf,.jpg,.jpeg,.png" required class="hidden">
          </div>

          <button id="btnSubmit" type="submit" class="w-full flex items-center justify-center gap-2 rounded-xl bg-slate-900 px-6 py-3.5 text-white font-bold hover:bg-black hover:shadow-lg hover:shadow-slate-900/20 active:scale-[0.98] transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
            Subir a la Nube
          </button>
        </form>
      </div>

      <!-- TABLA DE GASTOS RECIENTES -->
      <div class="lg:col-span-8 flex flex-col">
        <div class="bg-white rounded-3xl border border-slate-200 overflow-hidden flex-1 shadow-xl shadow-slate-200/40">
          <div class="overflow-x-auto min-h-[600px] max-h-[800px]">
            <table class="w-full text-left border-collapse">
              <thead class="sticky top-0 bg-slate-50/90 backdrop-blur z-10 border-b border-slate-200">
                <tr class="text-slate-500 font-black text-[10px] uppercase tracking-widest">
                  <th class="px-6 py-4">Concepto y Fecha</th>
                  <th class="px-6 py-4">Categoría</th>
                  <th class="px-6 py-4 text-right">Importe</th>
                  <th class="px-6 py-4 text-center">Visualizar</th>
                </tr>
              </thead>
              <tbody id="gastos-tbody" class="divide-y divide-slate-100 text-sm">
                <!-- Se inyecta por JS -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL DE EDICIÓN Y BITÁCORA -->
  <div id="editModal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4 opacity-0 transition-opacity duration-300">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh] scale-95 transition-transform duration-300" id="editModalPanel">
      <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between bg-white">
        <h3 class="text-lg font-black text-slate-800">Inspección Log <span id="edit-id-label" class="text-brand-500 font-bold ml-1 opacity-50"></span></h3>
        <button onclick="closeModal()" class="text-slate-400 hover:text-slate-900 transition-colors bg-slate-50 rounded-full p-2 hover:bg-slate-100">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
      </div>
      
      <div class="p-6 overflow-y-auto w-full custom-scrollbar">
        <form id="editForm" class="space-y-4">
          <input type="hidden" id="edit-id">
          
          <div>
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Motivo</label>
            <input type="text" id="edit-concepto" class="w-full rounded-xl border border-slate-200 focus:border-brand-500 focus:ring-1 focus:ring-brand-500 py-2.5 px-3 text-sm outline-none font-semibold text-slate-700 bg-slate-50 focus:bg-white transition" required>
          </div>
          
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Monto Económico</label>
              <input type="number" step="0.01" id="edit-importe" class="w-full rounded-xl border border-slate-200 focus:border-brand-500 focus:ring-1 focus:ring-brand-500 py-2.5 px-3 text-sm outline-none font-black text-slate-800 bg-slate-50 focus:bg-white transition" required>
            </div>
            <div>
              <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Tipología</label>
              <select id="edit-tipo" class="w-full rounded-xl border border-slate-200 focus:border-brand-500 focus:ring-1 focus:ring-brand-500 py-2.5 px-3 text-sm outline-none font-semibold text-slate-700 bg-slate-50 focus:bg-white transition" required>
                <option value="Factura">Factura</option>
                <option value="Ticket">Ticket</option>
                <option value="Vale">Vale</option>
              </select>
            </div>
          </div>
          
          <button type="button" onclick="salvarEdicion()" id="btnSaveEdit" class="w-full bg-brand-600 text-white font-bold rounded-xl px-4 py-3 hover:bg-brand-700 transition shadow-md shadow-brand-500/20 active:scale-[0.98] flex justify-center items-center mt-2">
            Sobreescribir Valores
          </button>
        </form>
        
        <!-- BITÁCORA DE MODIFICACIONES -->
        <div class="mt-8 pt-6 border-t border-slate-100">
          <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6 flex items-center gap-2">
            <svg class="w-3.5 h-3.5 text-brand-400" fill="currentColor" viewBox="0 0 20 20"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"/><path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd"/></svg>
            Historial de Mutación
          </h4>
          <div id="historial-container" class="space-y-0 relative before:absolute before:inset-y-0 before:left-2 before:w-0.5 before:bg-slate-100 pl-6">
            <!-- Renderizado dinámico -->
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
// --- SUPABASE CLIENT CONFIG ---
const supabaseUrl = "https://uywihjppwzrrfjkguvot.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5d2loanBwd3pycmZqa2d1dm90Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NTQ1OTEsImV4cCI6MjA4OTUzMDU5MX0.7eFia3SwiV4bBHvo-qZsmzEEu4RqTRMnMwbVZgrLZFw";
const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

// --- LÓGICA DE DRAG AND DROP ---
const dz=document.getElementById('dropzone');const fi=document.getElementById('fileInput');const fn=document.getElementById('fileName');
dz.addEventListener('click',()=>fi.click());
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag')});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');if(e.dataTransfer.files.length){fi.files=e.dataTransfer.files;updateName()}});
fi.addEventListener('change',updateName);
function updateName(){if(fi.files.length){fn.textContent=fi.files[0].name;fn.classList.remove('hidden')}}

// --- LÓGICA CORE ---
let currentUser = "Desconocido";
let gastosCache = [];

document.addEventListener("DOMContentLoaded", () => {
    try {
        const sessionStr = localStorage.getItem("crei_session");
        if(sessionStr) {
            const parsed = JSON.parse(sessionStr); if(parsed.user) currentUser = parsed.user.trim();
        }
    } catch(e) { console.warn("SSO Parsing skipped:", e); }
    
    const usSoInput = document.getElementById("usuario_sso");
    if(usSoInput) usSoInput.value = currentUser;
    
    if(currentUser.toLowerCase() !== 'desconocido') {
      const correoInput = document.getElementById("correo");
      if(correoInput) correoInput.value = `${currentUser.toLowerCase()}@crei.mx`;
    }

    loadGastos();
});

function alertMsg(msg, isError = false) {
    const box = document.getElementById('alertBox');
    document.getElementById('alertMessage').innerText = msg;
    box.className = `mb-6 rounded-xl border p-4 font-bold flex items-center justify-between ${isError ? 'bg-rose-50 border-rose-200 text-rose-800' : 'bg-emerald-50 border-emerald-200 text-emerald-800'}`;
    box.style.display = 'flex';
    setTimeout(() => box.style.display = 'none', 6000);
}

// 1. CARGA EN TIEMPO REAL DESDE SUPABASE
async function loadGastos() {
    const tbody = document.getElementById('gastos-tbody');
    tbody.innerHTML = '<tr><td colspan="4" class="p-16 text-center"><div class="inline-block animate-spin w-6 h-6 border-4 border-brand-500 border-t-transparent rounded-full mb-2"></div><p class="text-slate-400 font-bold text-xs uppercase tracking-widest">Sincronizando Nube...</p></td></tr>';
    
    try {
        let query = supabaseClient.from('gastos').select('*').order('creado_en', { ascending: false });
        
        // Regla Cero Confianza: Si NO eres el Admin ni el máster de CREI, filtra para ver SOLO CÓDIGOS de tu Usuario.
        if (currentUser !== 'Admin' && currentUser !== 'CREI') {
            query = query.eq('usuario', currentUser);
        }
        
        const { data, error } = await query;
            
        if(error) throw error;
        gastosCache = data;
        
        if(gastosCache.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-slate-400 font-medium">No existen registros financieros en la base de datos PostgreSQL.</td></tr>';
            return;
        }
        
        tbody.innerHTML = '';
        gastosCache.forEach(g => {
            // Resolver enlace estático heredado VS nube S3
            let publicUrl = '';
            if (g.archivo_path) {
                if (g.archivo_path.startsWith('uploads/')) {
                    publicUrl = window.location.origin + '/legacy-apps/comprobante/' + g.archivo_path; // Fallback local legacy
                } else if (g.archivo_path.startsWith('comprobantes/')) {
                    const { data: urlData } = supabaseClient.storage.from('comprobantes').getPublicUrl(g.archivo_path.split('comprobantes/')[1] || g.archivo_path);
                    publicUrl = urlData.publicUrl;
                } else {
                    publicUrl = g.archivo_path;
                }
            }

            const fileLink = publicUrl ? 
              `<a href="${publicUrl}" target="_blank" class="w-8 h-8 rounded-full bg-slate-50 border border-slate-200 text-brand-600 flex items-center justify-center hover:bg-brand-50 transition transform hover:scale-110 tooltip">
                 <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
               </a>` : '<span class="text-slate-300">-</span>';
            
            const d = new Date(g.creado_en);
            const dateStr = d.toLocaleDateString() + ' <span class="text-[10px] text-slate-400 font-semibold ml-1">' + d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + '</span>';
            const amount = parseFloat(g.importe).toLocaleString('es-MX', {style:'currency', currency:'MXN'});
            const historyObj = typeof g.historial === 'string' ? JSON.parse(g.historial || '[]') : (g.historial || []);
            const hasHistory = historyObj.length > 0;
            const historyBadge = hasHistory ? `<span class="ml-2 inline-block px-1.5 py-0.5 bg-brand-100 text-brand-700 text-[8px] font-black rounded uppercase tracking-wider tooltip">MODIFICADO</span>` : '';
            
            const tr = document.createElement('tr');
            tr.className = "hover:bg-slate-50/50 transition-colors group";
            tr.innerHTML = `
              <td class="px-6 py-4">
                <div class="text-slate-800 font-black mb-1 flex items-center gap-1">
                   <span class="w-1.5 h-1.5 rounded-full ${g.tipo==='Factura' ? 'bg-sky-500' : (g.tipo==='Ticket' ? 'bg-emerald-500' : 'bg-purple-500')}"></span>
                   ${g.concepto} ${historyBadge}
                </div>
                <div class="text-slate-500 text-xs font-semibold flex items-center gap-2">
                  <svg class="w-3.5 h-3.5 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                  ${g.usuario} &bull; ${dateStr}
                </div>
              </td>
              <td class="px-6 py-4">
                <span class="px-2.5 py-1 bg-slate-100 border border-slate-200 rounded text-[10px] font-black uppercase text-slate-600">${g.tipo}</span>
              </td>
              <td class="px-6 py-4 text-right font-black text-slate-900 tabular-nums tracking-tight">
                ${amount}
              </td>
              <td class="px-6 py-4 text-center">
                <div class="flex items-center justify-center gap-2">
                  ${fileLink}
                  <button onclick="openModal(${g.id})" class="text-slate-400 hover:text-slate-900 bg-white border border-slate-200 rounded-full w-8 h-8 flex items-center justify-center transition shadow-sm hover:shadow">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                  </button>
                </div>
              </td>
            `;
            tbody.appendChild(tr);
        });
    } catch(e) {
        tbody.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-rose-500 font-bold bg-rose-50/50">PostgreSQL Error: ${e.message}</td></tr>`;
    }
}

// 2. SUBIR NUEVO COMPROBANTE HACIA STORAGE Y POSTGRESQL NATIVO
document.getElementById('uploadForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btnSubmit');
    const oriHTML = btn.innerHTML;
    
    // Validaciones
    const file = fi.files[0];
    if(!file) return alertMsg("Inserta un archivo primero", true);
    
    btn.innerHTML = '<div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div> Almacenando...';
    btn.disabled = true;
    btn.style.opacity = '0.7';

    try {
        // Generar nombre unico S3
        const uuid = Date.now() + '_' + Math.random().toString(36).substring(2,8);
        const ext = file.name.split('.').pop();
        const secureFileName = `${uuid}.${ext}`;
        
        // 1. Storage Upload
        const { data: storageData, error: uploadErr } = await supabaseClient.storage
            .from('comprobantes')
            .upload(secureFileName, file);
            
        if(uploadErr) throw new Error("Fallo envío S3: " + uploadErr.message);
        
        // 2. Postgres Row Insert (Auto-ID vía DB. Si en tu CSV el max id fue X, el default autoincremental de la columna BigInt funciona o le generamos un timestamp simulando BIGINT)
        const newId = Date.now();
        
        const payload = {
            id: newId,
            usuario: currentUser,
            correo: document.getElementById('correo').value,
            concepto: document.getElementById('concepto').value,
            importe: parseFloat(document.getElementById('importe').value).toFixed(2),
            tipo: document.querySelector('input[name="tipo"]:checked').value,
            archivo_path: `comprobantes/${secureFileName}`,
            archivo_mime: file.type,
            historial: []
        };
        
        const { error: dbErr } = await supabaseClient.from('gastos').insert([payload]);
        if(dbErr) throw new Error("Falla registro SQL: " + dbErr.message);
        
        // Limpiar form
        document.getElementById('uploadForm').reset();
        fn.classList.add('hidden');
        const usSoInput2 = document.getElementById("usuario_sso");
        if(usSoInput2) usSoInput2.value = currentUser;
        
        alertMsg("¡Bloque de recibo guardado en la arquitectura Serverless!");
        loadGastos();
        
    } catch(err) {
        alertMsg(err.message, true);
    } finally {
        btn.innerHTML = oriHTML;
        btn.disabled = false;
        btn.style.opacity = '1';
    }
});

// 3. ACTUALIZACIONES DE AUDITORÍA JS
function openModal(id) {
    const gasto = gastosCache.find(g => parseInt(g.id) === parseInt(id));
    if(!gasto) return;
    
    document.getElementById('edit-id').value = gasto.id;
    document.getElementById('edit-id-label').innerText = `#${gasto.id}`;
    document.getElementById('edit-concepto').value = gasto.concepto;
    document.getElementById('edit-importe').value = parseFloat(gasto.importe).toFixed(2);
    document.getElementById('edit-tipo').value = gasto.tipo;
    
    const historias = typeof gasto.historial === 'string' ? JSON.parse(gasto.historial||'[]') : (gasto.historial||[]);
    renderHistorial(historias);
    
    const modal = document.getElementById('editModal');
    const panel = document.getElementById('editModalPanel');
    modal.classList.remove('hidden');
    modal.style.display = 'flex';
    setTimeout(() => { modal.classList.remove('opacity-0'); panel.classList.remove('scale-95'); }, 10);
}

function closeModal() {
    const modal = document.getElementById('editModal');
    const panel = document.getElementById('editModalPanel');
    modal.classList.add('opacity-0');
    panel.classList.add('scale-95');
    setTimeout(() => { modal.classList.add('hidden'); modal.style.display = 'none'; }, 300);
}

function renderHistorial(historias) {
    const container = document.getElementById('historial-container');
    if(!historias || !historias.length) {
        container.innerHTML = `
          <div class="relative pl-6 pb-2">
            <span class="absolute left-[-15px] top-1.5 h-2 w-2 shadow-[0_0_0_4px_white] rounded-full bg-slate-300"></span>
            <p class="text-[10px] font-bold text-slate-400">El bloque de datos está intacto y sellado.</p>
          </div>
        `;
        return;
    }
    
    container.innerHTML = '';
    [...historias].reverse().forEach((h, i) => {
        let lis = h.cambios.map(c => `<li class="text-slate-600 font-medium">${c}</li>`).join('');
        container.innerHTML += `
        <div class="relative pl-6 pb-5 group">
          <span class="absolute left-[-15px] top-1.5 h-2 w-2 shadow-[0_0_0_4px_white] rounded-full bg-brand-500 group-hover:scale-125 transition"></span>
          <div class="bg-slate-50 border border-slate-100 rounded-lg p-3">
            <div class="flex items-center justify-between mb-2">
              <span class="font-black text-slate-800 text-[10px] uppercase">${h.autor} editó registros funcionales</span>
              <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">${new Date(h.fecha).toLocaleString()}</span>
            </div>
            <ul class="text-[11px] leading-relaxed list-disc list-inside space-y-0.5 ml-1 marker:text-brand-500">${lis}</ul>
          </div>
        </div>
        `;
    });
}

async function salvarEdicion() {
    const id = document.getElementById('edit-id').value;
    const concepto = document.getElementById('edit-concepto').value.trim();
    const importe = document.getElementById('edit-importe').value;
    const tipo = document.getElementById('edit-tipo').value;
    
    if(!concepto || !importe || !tipo) return alertMsg('Propiedades vacías', true);
    
    const btn = document.getElementById('btnSaveEdit');
    const oldText = btn.innerText;
    btn.innerText = 'Forzando Actualización...';
    btn.disabled = true;
    
    try {
        // Encontrar datos viejos localmente
        const gasto = gastosCache.find(g => parseInt(g.id) === parseInt(id));
        const historiasAnteriores = typeof gasto.historial === 'string' ? JSON.parse(gasto.historial||'[]') : (gasto.historial||[]);
        
        let cambios = [];
        if(gasto.concepto !== concepto) cambios.push(`Concepto: '${gasto.concepto}' → '${concepto}'`);
        if(parseFloat(gasto.importe).toFixed(2) !== parseFloat(importe).toFixed(2)) cambios.push(`Monto Efectivo: $${parseFloat(gasto.importe).toFixed(2)} → $${parseFloat(importe).toFixed(2)}`);
        if(gasto.tipo !== tipo) cambios.push(`Clase: '${gasto.tipo}' → '${tipo}'`);
        
        if(cambios.length === 0) {
            closeModal();
            return;
        }
        
        historiasAnteriores.push({
            fecha: new Date().toISOString(),
            autor: currentUser,
            cambios: cambios
        });
        
        const payload = {
            concepto,
            importe: parseFloat(importe).toFixed(2),
            tipo,
            historial: historiasAnteriores
        };

        const { error } = await supabaseClient.from('gastos').update(payload).eq('id', id);
        if(error) throw new Error("Falla de capa SQL: " + error.message);
        
        alertMsg(`Registro #${id} mutado exitosamente`);
        closeModal();
        loadGastos();
        
    } catch(e) {
        alertMsg(e.message, true);
    } finally {
        btn.innerText = oldText;
        btn.disabled = false;
    }
}
